<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" width="420" height="340" role="img" aria-label="Top Skills">
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
]]></style>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#00d4ff;#8b5cf6;#00d4ff" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#8b5cf6;#00d4ff;#8b5cf6" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".08"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
<clipPath id="cardc"><rect x="1" y="1" width="418" height="338" rx="14"/></clipPath>
</defs>
<rect x="1" y="1" width="418" height="338" rx="14" fill="#0b0b2e" stroke="url(#tg)" stroke-width="1.5"/>

<!-- Header -->
<text x="20" y="34" font-size="16" font-weight="bold" fill="url(#tg)">🧠 Top Skills</text>

<!-- Python - 95% -->
<g class="row" style="animation-delay:0.60s">
  <circle cx="26" cy="75" r="5" fill="#00d4ff"/>
  <text x="40" y="80" font-size="13" fill="#e6edf3" font-weight="bold">Python</text>
  <text x="396" y="80" text-anchor="end" font-size="13" fill="#00d4ff" font-weight="bold">95%</text>
  <rect x="40" y="88" width="356" height="9" rx="4.5" fill="#1a1a4a"/>
  <rect class="bar" x="40" y="88" width="0" height="9" rx="4.5" fill="#00d4ff">
    <animate attributeName="width" from="0" to="338.2" dur="1.1s" begin="0.75s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- Machine Learning - 90% -->
<g class="row" style="animation-delay:0.95s">
  <circle cx="26" cy="117" r="5" fill="#8b5cf6"/>
  <text x="40" y="122" font-size="13" fill="#e6edf3" font-weight="bold">Machine Learning</text>
  <text x="396" y="122" text-anchor="end" font-size="13" fill="#8b5cf6" font-weight="bold">90%</text>
  <rect x="40" y="130" width="356" height="9" rx="4.5" fill="#1a1a4a"/>
  <rect class="bar" x="40" y="130" width="0" height="9" rx="4.5" fill="#8b5cf6">
    <animate attributeName="width" from="0" to="320.4" dur="1.1s" begin="1.10s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- Deep Learning - 85% -->
<g class="row" style="animation-delay:1.30s">
  <circle cx="26" cy="159" r="5" fill="#ff7eb6"/>
  <text x="40" y="164" font-size="13" fill="#e6edf3" font-weight="bold">Deep Learning</text>
  <text x="396" y="164" text-anchor="end" font-size="13" fill="#ff7eb6" font-weight="bold">85%</text>
  <rect x="40" y="172" width="356" height="9" rx="4.5" fill="#1a1a4a"/>
  <rect class="bar" x="40" y="172" width="0" height="9" rx="4.5" fill="#ff7eb6">
    <animate attributeName="width" from="0" to="302.6" dur="1.1s" begin="1.45s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- TensorFlow - 80% -->
<g class="row" style="animation-delay:1.65s">
  <circle cx="26" cy="201" r="5" fill="#00d4ff"/>
  <text x="40" y="206" font-size="13" fill="#e6edf3" font-weight="bold">TensorFlow</text>
  <text x="396" y="206" text-anchor="end" font-size="13" fill="#00d4ff" font-weight="bold">80%</text>
  <rect x="40" y="214" width="356" height="9" rx="4.5" fill="#1a1a4a"/>
  <rect class="bar" x="40" y="214" width="0" height="9" rx="4.5" fill="#00d4ff">
    <animate attributeName="width" from="0" to="284.8" dur="1.1s" begin="1.80s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- PyTorch - 75% -->
<g class="row" style="animation-delay:2.00s">
  <circle cx="26" cy="243" r="5" fill="#8b5cf6"/>
  <text x="40" y="248" font-size="13" fill="#e6edf3" font-weight="bold">PyTorch</text>
  <text x="396" y="248" text-anchor="end" font-size="13" fill="#8b5cf6" font-weight="bold">75%</text>
  <rect x="40" y="256" width="356" height="9" rx="4.5" fill="#1a1a4a"/>
  <rect class="bar" x="40" y="256" width="0" height="9" rx="4.5" fill="#8b5cf6">
    <animate attributeName="width" from="0" to="267" dur="1.1s" begin="2.15s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- OpenCV - 70% -->
<g class="row" style="animation-delay:2.35s">
  <circle cx="26" cy="285" r="5" fill="#ff7eb6"/>
  <text x="40" y="290" font-size="13" fill="#e6edf3" font-weight="bold">OpenCV</text>
  <text x="396" y="290" text-anchor="end" font-size="13" fill="#ff7eb6" font-weight="bold">70%</text>
  <rect x="40" y="298" width="356" height="9" rx="4.5" fill="#1a1a4a"/>
  <rect class="bar" x="40" y="298" width="0" height="9" rx="4.5" fill="#ff7eb6">
    <animate attributeName="width" from="0" to="249.2" dur="1.1s" begin="2.50s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- Scikit-Learn - 85% -->
<g class="row" style="animation-delay:2.70s">
  <circle cx="26" cy="327" r="5" fill="#00d4ff"/>
  <text x="40" y="332" font-size="13" fill="#e6edf3" font-weight="bold">Scikit-Learn</text>
  <text x="396" y="332" text-anchor="end" font-size="13" fill="#00d4ff" font-weight="bold">85%</text>
  <rect x="40" y="340" width="356" height="9" rx="4.5" fill="#1a1a4a"/>
  <rect class="bar" x="40" y="340" width="0" height="9" rx="4.5" fill="#00d4ff">
    <animate attributeName="width" from="0" to="302.6" dur="1.1s" begin="2.85s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- Shine effect -->
<g clip-path="url(#cardc)">
  <rect class="sh" x="0" y="0" width="100" height="338" fill="url(#shg)" transform="skewX(-15)"/>
</g>
</svg>
