<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161645"/>
      <stop offset="100%" stop-color="#0b0b2e"/>
    </linearGradient>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ff7eb6"/>
    </linearGradient>
  </defs>

  <!-- Lanyard string -->
  <path d="M200 20 Q180 60 190 100 L200 130 L210 100 Q220 60 200 20" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.5"/>

  <!-- ID Card -->
  <rect x="40" y="120" width="320" height="350" rx="16" fill="url(#cardBg)" stroke="url(#cardBorder)" stroke-width="2"/>

  <!-- Photo placeholder -->
  <circle cx="200" cy="190" r="55" fill="#161645" stroke="#00d4ff" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial" font-size="28" fill="#00d4ff">👨‍💻</text>

  <!-- Name -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#00d4ff">Vaibhav Chaudhary</text>

  <!-- Title -->
  <text x="200" y="298" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="14" fill="#8b5cf6">AI/ML Engineer</text>

  <!-- Divider -->
  <line x1="60" y1="315" x2="340" y2="315" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

  <!-- Info rows -->
  <text x="70" y="345" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#6e7781">📍</text>
  <text x="95" y="345" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#f0f6fc">Surat, Gujarat, India</text>

  <text x="70" y="370" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#6e7781">📧</text>
  <text x="95" y="370" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#f0f6fc">vaibhavchaudhary508@gmail.com</text>

  <text x="70" y="395" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#6e7781">🐙</text>
  <text x="95" y="395" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#f0f6fc">github.com/vaibhavchau37</text>

  <text x="70" y="420" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#6e7781">🔗</text>
  <text x="95" y="420" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#f0f6fc">linkedin.com/in/vaibhav-chaudhary37</text>

  <!-- Badge at bottom -->
  <rect x="100" y="440" width="200" height="20" rx="10" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="200" y="453" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="9" fill="#00d4ff">BUILDING AI THAT IMPACTS MILLIONS</text>
</svg>
